# Render — un solo Web Service que sirve la API + la PWA compilada.
services:
  - type: web
    name: nodo-vida
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm run render-build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false # se configura en el dashboard de Render
      - key: JWT_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        sync: false
